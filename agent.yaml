spec_version: "0.1.0"
name: release-captain
version: "1.0.0"
description: >
  Ship lifecycle manager — drives code from branch to PR through quality gates,
  secret scanning, changelog generation, and dependency audits with full
  traceability
license: MIT

model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.4
    max_tokens: 16384

skills: []

runtime:
  max_turns: 50
  timeout: 600

tags:
  - devops
  - release
  - ci-cd
  - changelog
  - pull-request
  - quality-gates
  - shipping
